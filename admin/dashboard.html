<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Historique des transactions</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #22c55e;
    --danger: #ef4444;
    --pending: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  h1 { font-size: 20px; margin: 0; }
  button.logout {
    background: transparent;
    border: 1px solid #334155;
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  button.logout:hover { border-color: var(--danger); color: var(--danger); }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #334155; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; display: inline-block; }
  .badge.SUCCESS { background: rgba(34,197,94,.15); color: var(--accent); }
  .badge.FAILED { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge.PENDING { background: rgba(245,158,11,.15); color: var(--pending); }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 20px 0; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: var(--card); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>📊 Historique des transactions</h1>
    <button class="logout" id="logout-btn">Se déconnecter</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Transaction</th>
          <th>Montant</th>
          <th>Statut</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="5" class="empty">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function formatDate(iso) {
    return new Date(iso).toLocaleString("fr-FR");
  }
  function formatAmount(a) {
    return new Intl.NumberFormat("fr-FR").format(a) + " FCFA";
  }

  async function loadHistory() {
    const res = await fetch("/api/transactions");

    if (res.status === 401) {
      window.location.href = "/admin/login.html";
      return;
    }

    const data = await res.json();
    const body = document.getElementById("history-body");
    const statsEl = document.getElementById("stats");

    const success = data.filter(t => t.status === "SUCCESS");
    const failed = data.filter(t => t.status === "FAILED");
    const totalAmount = success.reduce((sum, t) => sum + (t.amount || 0), 0);

    statsEl.innerHTML = `
      <div class="stat"><div class="label">Total transactions</div><div class="value">${data.length}</div></div>
      <div class="stat"><div class="label">Payés</div><div class="value" style="color:var(--accent)">${success.length}</div></div>
      <div class="stat"><div class="label">Échoués</div><div class="value" style="color:var(--danger)">${failed.length}</div></div>
      <div class="stat"><div class="label">Montant encaissé</div><div class="value">${formatAmount(totalAmount)}</div></div>
    `;

    if (!data.length) {
      body.innerHTML = `<tr><td colspan="5" class="empty">Aucune transaction pour le moment.</td></tr>`;
      return;
    }

    body.innerHTML = data.map(t => `
      <tr>
        <td>${formatDate(t.updatedAt)}</td>
        <td>${t.transactionId}</td>
        <td>${formatAmount(t.amount)}</td>
        <td><span class="badge ${t.status}">${t.status === "SUCCESS" ? "Payé" : t.status === "FAILED" ? "Échoué" : "En attente"}</span></td>
        <td>${t.description || "—"}</td>
      </tr>
    `).join("");
  }

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await fetch("/api/admin/logout", { method: "POST" });
    window.location.href = "/admin/login.html";
  });

  loadHistory();
</script>
</body>
</html>
