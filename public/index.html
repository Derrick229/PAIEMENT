<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XSMARTPUMP - Paiement</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #22c55e;
    --accent-dark: #16a34a;
    --danger: #ef4444;
    --pending: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --input-bg: #0f172a;
  }
  [data-theme="light"] {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --input-bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px;
    transition: background .2s, color .2s;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  h1 { font-size: 22px; margin: 0; }
  p.subtitle { color: var(--muted); margin-top: 4px; margin-bottom: 24px; }
  .theme-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 16px;
  }
  input:focus { outline: 2px solid var(--accent); }
  .price-display {
    background: var(--input-bg);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    margin-bottom: 20px;
  }
  .price-display .amount { font-size: 28px; font-weight: 700; color: var(--accent); }
  .price-display .label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  button.pay-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #052e13;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background .15s;
  }
  button.pay-btn:hover { background: var(--accent-dark); }
  button.pay-btn:disabled { opacity: .5; cursor: not-allowed; }
  #status-msg { margin-top: 14px; font-size: 14px; min-height: 18px; }
  .receipt {
    display: none;
    background: var(--input-bg);
    border-radius: 12px;
    padding: 18px;
    margin-top: 16px;
    font-size: 14px;
  }
  .receipt.show { display: block; }
  .receipt .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .receipt .row:last-child { border-bottom: none; }
  .receipt .row span:first-child { color: var(--muted); }
  .waiting-msg {
    display: none;
    text-align: center;
    padding: 16px;
    background: rgba(245,158,11,.12);
    border-radius: 10px;
    color: var(--pending);
    font-weight: 600;
    margin-top: 16px;
  }
  .waiting-msg.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="top-row">
    <h1>💧 XSMARTPUMP</h1>
    <button class="theme-toggle" id="theme-toggle" title="Changer de thème">🌙</button>
  </div>
  <p class="subtitle">Distributeur automatique de liquide — paiement sécurisé</p>

  <div class="card" id="order-card">
    <label for="quantity">Quantité souhaitée (Litres)</label>
    <input type="number" id="quantity" min="1" step="0.5" value="5" />

    <label for="email">Email pour recevoir votre reçu (optionnel)</label>
    <input type="email" id="email" placeholder="vous@exemple.com" />

    <div class="price-display">
      <div class="label">Montant à payer</div>
      <div class="amount" id="amount-display">-- FCFA</div>
    </div>

    <button class="pay-btn" id="pay-btn">Payer avec KKiaPay</button>
    <div id="status-msg"></div>

    <div class="waiting-msg" id="waiting-msg">
      ⏳ Paiement confirmé ! Merci de préparer votre récipient, votre commande va être servie.
    </div>

    <div class="receipt" id="receipt">
      <div class="row"><span>Quantité</span><span id="r-quantity"></span></div>
      <div class="row"><span>Prix / litre</span><span id="r-price"></span></div>
      <div class="row"><span>Montant payé</span><span id="r-amount"></span></div>
      <div class="row"><span>Date</span><span id="r-date"></span></div>
      <div class="row"><span>Référence</span><span id="r-ref"></span></div>
    </div>
  </div>
</div>

<script src="https://cdn.kkiapay.me/k.js"></script>
<script>
  let PUBLIC_KEY = "";
  let SANDBOX = true;
  let PRICE_PER_LITER = 0;
  let CURRENT_ORDER = null;

  // --- Thème clair/sombre ---
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("theme-toggle").textContent = theme === "light" ? "🌙" : "☀️";
    localStorage.setItem("xsmartpump-theme", theme);
  }
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    applyTheme(current);
  });
  applyTheme(localStorage.getItem("xsmartpump-theme") || "dark");

  async function loadConfig() {
    const res = await fetch("/api/config");
    const cfg = await res.json();
    PUBLIC_KEY = cfg.publicKey;
    SANDBOX = cfg.sandbox;
    PRICE_PER_LITER = cfg.pricePerLiter;
    updateAmountDisplay();
  }

  function formatAmount(a) {
    return new Intl.NumberFormat("fr-FR").format(Math.round(a)) + " FCFA";
  }

  function updateAmountDisplay() {
    const qty = parseFloat(document.getElementById("quantity").value) || 0;
    const amount = qty * PRICE_PER_LITER;
    document.getElementById("amount-display").textContent = formatAmount(amount);
  }
  document.getElementById("quantity").addEventListener("input", updateAmountDisplay);

  function setStatusMsg(text, color) {
    const el = document.getElementById("status-msg");
    el.textContent = text;
    el.style.color = color;
  }

  document.getElementById("pay-btn").addEventListener("click", async () => {
    const quantityLiters = parseFloat(document.getElementById("quantity").value);
    const customerEmail = document.getElementById("email").value;

    if (!quantityLiters || quantityLiters <= 0) {
      setStatusMsg("Quantité invalide.", "#ef4444");
      return;
    }

    setStatusMsg("Préparation de la commande...", "#f59e0b");

    // 1. On crée la commande côté serveur (le prix est calculé et figé là-bas)
    const res = await fetch("/api/orders/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ quantityLiters, customerEmail }),
    });
    const order = await res.json();
    if (!res.ok) {
      setStatusMsg(order.error || "Erreur lors de la création de la commande.", "#ef4444");
      return;
    }
    CURRENT_ORDER = order;
    setStatusMsg("", "");

    // 2. Ouverture du widget KKiaPay avec le montant validé par le serveur
    openKkiapayWidget({
      amount: order.amount,
      key: PUBLIC_KEY,
      sandbox: SANDBOX,
      position: "center",
      data: order.orderId,
    });
  });

  addSuccessListener(async (response) => {
    setStatusMsg("Paiement reçu, vérification en cours...", "#f59e0b");
    const res = await fetch("/api/transactions/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ orderId: CURRENT_ORDER.orderId, transactionId: response.transactionId }),
    });
    const record = await res.json();

    if (record.status === "SUCCESS") {
      setStatusMsg("", "");
      document.getElementById("waiting-msg").classList.add("show");

      document.getElementById("r-quantity").textContent = record.quantity_liters + " L";
      document.getElementById("r-price").textContent = formatAmount(record.price_per_liter) + " / L";
      document.getElementById("r-amount").textContent = formatAmount(record.amount);
      document.getElementById("r-date").textContent = new Date(record.updated_at).toLocaleString("fr-FR");
      document.getElementById("r-ref").textContent = record.transaction_id;
      document.getElementById("receipt").classList.add("show");
      document.getElementById("pay-btn").disabled = true;
    } else if (record.status === "PENDING") {
      setStatusMsg("⏳ Paiement en attente de confirmation.", "#f59e0b");
    } else {
      setStatusMsg("❌ Le paiement n'a pas pu être confirmé.", "#ef4444");
    }
  });

  addFailedListener(async (response) => {
    setStatusMsg("❌ Paiement échoué ou annulé.", "#ef4444");
    if (response && response.transactionId && CURRENT_ORDER) {
      await fetch("/api/transactions/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ orderId: CURRENT_ORDER.orderId, transactionId: response.transactionId }),
      });
    }
  });

  loadConfig();
</script>
</body>
</html>
